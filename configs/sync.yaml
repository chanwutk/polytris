# Sync configuration for rsync-based file synchronization
# This config specifies how to sync code files from local to remote

# Remote host configuration
remote:
  host: ace                               # SSH alias (defined in ~/.ssh/config)
  path: /work/cwkt/projects/polyis        # Destination path on remote machine

# Local source directory (defaults to current directory if not specified)
local_path: .

# File inclusion/exclusion patterns
# Uses a structured format: includes are generated from the cross-product of
# directories × extensions, plus explicit root_files.
includes:
  # Files in the project root to sync directly
  root_files:
    - "setup.py"
    - "pyproject.toml"
    - "requirements.txt"
    - "Dockerfile"
    - "docker-compose.yml"
    - "docker-compose.base.yml"
    - "environment.yml"
    - "run"
    - "dock"
    - "build.sh"
    - "AGENTS.md"
    - ".gitignore"
    - ".gitmodules"

  # Directories to sync (cross-product with extensions below)
  directories:
    - ".claude"
    - ".cursor"
    - ".github"
    - ".vscode"
    - "assets"
    - "configs"
    - "copy"
    - "evaluation"
    - "execution"
    - "ablation"
    - "gcp"
    - "lib"
    - "polyis"
    - "preprocess"
    - "scripts"
    - "tests"

  # File extensions to include within each directory
  extensions:
    - "*.py"
    - "*.pyx"
    - "*.pyi"
    - "*.c"
    - "*.h"
    - "*.hpp"
    - "*.cpp"
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.toml"
    - "*.sh"
    - "*.md"
    - "*.txt"

# Exclusion patterns (applied before includes, takes precedence)
# These patterns exclude files/directories that shouldn't be synced
excludes:
  # Model weights (exclude from root and all subdirectories)
  - "*.pth"
  - "*.pt"
  - "**/*.pth"
  - "**/*.pt"

  # Python cache and compiled files
  - "**/__pycache__/"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.so"

  - ".venv/**"
  - "venv/**"
  - "venv"
  - ".git/**"
  - ".git"

# Rsync options
# Common options:
# -a: archive mode (preserves permissions, timestamps, etc.)
# -v: verbose
# -z: compress during transfer
# -h: human-readable output
# --delete: delete files on remote that don't exist locally (use with caution)
# --dry-run: preview changes without actually syncing
rsync_options:
  - "-a"           # Archive mode
  - "-v"           # Verbose
  - "-z"           # Compress
  - "-h"           # Human-readable
  - "--progress"   # Show progress
  # Uncomment the following for dry-run (preview only):
  # - "--dry-run"
  # Uncomment to delete files on remote that don't exist locally:
  # - "--delete"
