# Sync configuration for rsync-based file synchronization
# This config specifies how to sync code files from local to remote

# Remote host configuration
remote:
  host: user@remote-host.example.com  # SSH host (user@hostname or hostname)
  path: /work/cwkt/projects/polyis    # Destination path on remote machine

# Local source directory (defaults to current directory if not specified)
local_path: .

# File inclusion/exclusion patterns
# Patterns follow rsync include/exclude syntax (supports wildcards: *, ?, **)
# 
# Pattern matching rules:
# - * matches any characters except /
# - ** matches any characters including /
# - ? matches a single character
# - Patterns are matched in order (first match wins)
# - If includes are specified, only matching files are synced
# - If no includes are specified, all files are synced except excludes
# - Directory patterns should end with / (e.g., "configs/**")
includes:
  # Allow directory traversal
  - "*/"
  
  # Include all files in project root
  - "*"
  
  # Include Python, C, Cython, and config files in specific directories
  # .claude directory
  - ".claude/**/*.py"
  - ".claude/**/*.pyx"
  - ".claude/**/*.pyi"
  - ".claude/**/*.c"
  - ".claude/**/*.h"
  - ".claude/**/*.hpp"
  - ".claude/**/*.cpp"
  - ".claude/**/*.yaml"
  - ".claude/**/*.yml"
  - ".claude/**/*.json"
  - ".claude/**/*.toml"
  
  # .cursor directory
  - ".cursor/**/*.py"
  - ".cursor/**/*.pyx"
  - ".cursor/**/*.pyi"
  - ".cursor/**/*.c"
  - ".cursor/**/*.h"
  - ".cursor/**/*.hpp"
  - ".cursor/**/*.cpp"
  - ".cursor/**/*.yaml"
  - ".cursor/**/*.yml"
  - ".cursor/**/*.json"
  - ".cursor/**/*.toml"
  
